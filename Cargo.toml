[package]
name = "rush-qdrant"
version = "0.1.0"
edition = "2024"

[dependencies]
# ML/Embeddings
candle-core = { version = "0.9.2", features = ["accelerate"] }
candle-transformers = "0.9.2"
candle-nn = "0.9.2"
tokenizers = "0.21.0"
hf-hub = "0.4.0"

# CLI
clap = { version = "4.5.23", features = ["derive"] }

# File system
walkdir = "2.5.0"

# Serialization
serde = { version = "1.0.215", features = ["derive"] }
serde_json = "1.0.133"

# HTTP
reqwest = { version = "0.12", features = ["json", "blocking"] }

# Utilities
anyhow = "1.0.93"
uuid = { version = "1.11.0", features = ["v4", "serde"] }
twox-hash = "1.6"
serde_bytes = "0.11"
